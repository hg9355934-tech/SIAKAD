<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistem Informasi Akademik</title>
    
    <!-- Framework & Library -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="container-fluid vh-100 p-0">
        <div class="row g-0 h-100">
            
            <!-- Kolom Kiri: Visual/Gambar -->
            <div class="col-md-6 d-none d-md-block bg-left">
                <div class="deco-left-top"></div>
            </div>

            <!-- Kolom Kanan: Area Login -->
            <div class="col-md-6 d-flex justify-content-center align-items-center position-relative">
                
                <!-- Dekorasi Background -->
                <div class="deco-right-top"></div>
                <div class="deco-right-bottom"></div>

                <div class="login-wrapper text-center px-4">
                    <!-- Branding -->
                    <img src="assets/img/logo-client.png" alt="Logo" class="logo-img">
                    <h3 class="fw-bold mb-2" style="font-size: 1.4rem; color: #1a1a1a;">SISTEM INFORMASI AKADEMIK</h3>
                    <p class="text-muted mb-4" style="font-size: 0.9rem;">Silakan login menggunakan Username & Password anda!</p>

                    <!-- Form Login -->
                    <form action="dashboard_mahasiswa.html">
                        <!-- Input: Username -->
                        <div class="custom-input-group mb-3">
                            <i class="fa-solid fa-user"></i>
                            <input type="text" name="username" class="form-control" placeholder="Username.." required>
                        </div>

                        <!-- Input: Password -->
                        <div class="custom-input-group mb-4">
                            <i class="fa-solid fa-lock"></i>
                            <input type="password" name="password" id="passwordField" class="form-control" placeholder="Password.." required>
                            <i class="fa-solid fa-eye-slash" id="togglePassword" style="cursor: pointer; font-size: 0.9rem;"></i>
                        </div>

                        <!-- Action: Login -->
                        <div class="mb-2">
                            <button type="submit" class="btn-login">Login</button>
                        </div>

                        <!-- Link SSO -->
                        <div class="text-center">
                            <a href="#" class="text-decoration-none" style="color: #4a74c9; font-size: 0.9rem;">Login with SSO</a>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="script.js"></script>
></body>
</html>
